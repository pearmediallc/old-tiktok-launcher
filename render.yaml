services:
  - type: web
    name: tiktok-launcher
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: DB_DRIVER
        value: pgsql
      - key: DB_URL
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_ADVERTISER_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: REDTRACK_API_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TIKTOK_ENVIRONMENT
        value: production
