<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Parsing Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        .error { color: red; }
        .success { color: green; }
        .debug { background: #f5f5f5; padding: 10px; margin: 10px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Excel Parsing Debug Test</h1>
    
    <div class="test-section">
        <h3>Upload Test Excel File</h3>
        <input type="file" id="test-file" accept=".xlsx,.xls,.csv" onchange="testExcelParsing(event)">
        <div id="test-output"></div>
    </div>

    <!-- SheetJS library for Excel file parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        function testExcelParsing(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const output = document.getElementById('test-output');
            output.innerHTML = '<div class="debug">Starting file processing...</div>';
            
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        output.innerHTML += '<div class="debug">File loaded, parsing with SheetJS...</div>';
                        
                        // Parse the Excel file
                        const workbook = XLSX.read(e.target.result, { type: 'array' });
                        output.innerHTML += '<div class="debug">Workbook parsed successfully</div>';
                        output.innerHTML += '<div class="debug">Sheet names: ' + workbook.SheetNames.join(', ') + '</div>';
                        
                        // Get the first worksheet
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        output.innerHTML += '<div class="debug">Using sheet: ' + sheetName + '</div>';
                        
                        // Convert to JSON
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        output.innerHTML += '<div class="debug">Converted to JSON, rows: ' + jsonData.length + '</div>';
                        
                        // Show raw data
                        output.innerHTML += '<h4>Raw Excel Data:</h4>';
                        jsonData.forEach((row, i) => {
                            output.innerHTML += '<div class="debug">Row ' + i + ': ' + JSON.stringify(row) + '</div>';
                        });
                        
                        if (jsonData.length < 2) {
                            throw new Error('Excel file must have at least a header row and one data row');
                        }
                        
                        // Test our parsing logic
                        output.innerHTML += '<h4>Testing Parsing Logic:</h4>';
                        
                        const headerRow = jsonData[0];
                        output.innerHTML += '<div class="debug">Header row: ' + JSON.stringify(headerRow) + '</div>';
                        
                        if (!headerRow || headerRow.length === 0) {
                            throw new Error('Excel file header row is empty');
                        }
                        
                        const header = headerRow[0] ? headerRow[0].toString().toLowerCase().trim() : '';
                        output.innerHTML += '<div class="debug">Header (normalized): "' + header + '"</div>';
                        
                        const isLocationIds = header.includes('location_id') || header.includes('id');
                        const isStateNames = header.includes('state') || header.includes('name');
                        
                        output.innerHTML += '<div class="debug">Is Location IDs: ' + isLocationIds + '</div>';
                        output.innerHTML += '<div class="debug">Is State Names: ' + isStateNames + '</div>';
                        
                        if (!isLocationIds && !isStateNames) {
                            throw new Error('Excel header must contain either "State" or "location_id". Found: "' + header + '"');
                        }
                        
                        const locations = [];
                        
                        // Process data rows
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;
                            
                            const value = row[0] ? row[0].toString().trim() : '';
                            if (!value) continue;
                            
                            output.innerHTML += '<div class="debug">Processing row ' + i + ': "' + value + '"</div>';
                            
                            if (isLocationIds) {
                                if (!/^\d+$/.test(value)) {
                                    throw new Error(`Invalid location ID: ${value}. Must be numeric.`);
                                }
                                locations.push({
                                    id: value,
                                    name: `Location ID: ${value}`,
                                    type: 'id'
                                });
                            } else {
                                locations.push({
                                    id: null,
                                    name: value,
                                    type: 'state'
                                });
                            }
                        }
                        
                        output.innerHTML += '<div class="success">✅ Successfully parsed ' + locations.length + ' locations!</div>';
                        output.innerHTML += '<h4>Parsed Locations:</h4>';
                        locations.forEach((loc, i) => {
                            output.innerHTML += '<div class="debug">' + (i + 1) + ': ' + loc.name + ' (type: ' + loc.type + ')</div>';
                        });
                        
                    } catch (error) {
                        output.innerHTML += '<div class="error">❌ Error: ' + error.message + '</div>';
                        console.error('Excel parsing error:', error);
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                output.innerHTML += '<div class="error">Please select an Excel file (.xlsx or .xls)</div>';
            }
        }
    </script>
</body>
</html>
