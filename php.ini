; PHP Configuration for TikTok Campaign Launcher
; Increased limits for video uploads (up to 500MB)
; IMPORTANT: .htaccess php_value directives override these settings — keep both in sync

upload_max_filesize = 500M
post_max_size = 510M
memory_limit = 512M
max_execution_time = 600
max_input_time = 600
file_uploads = On
